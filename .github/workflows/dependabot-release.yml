name: Dependabot Auto-Release

on:
  pull_request:
    types: ["closed"]
    branches: ["main"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  bump:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      sha: ${{ steps.bump.outputs.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          OLD=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "0,/^version = \"$OLD\"/s//version = \"$NEW\"/" Cargo.toml
          cargo update --workspace
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version $OLD to $NEW (dependabot)"
          git push
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: bump
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.sha }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      - name: GTK deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libgtk-3-dev \
            libappindicator3-dev libxdo-dev libssl-dev libwayland-dev dpkg-dev

      - name: Build
        run: cargo build --release --verbose

      - name: Get package name
        id: pkg
        shell: bash
        run: |
          NAME=$(grep '^name' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv target/release/${{ steps.pkg.outputs.name }}.exe \
               target/release/${{ steps.pkg.outputs.name }}-windows.exe
          else
            mv target/release/${{ steps.pkg.outputs.name }} \
               target/release/${{ steps.pkg.outputs.name }}-linux
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/release/${{ steps.pkg.outputs.name }}-*

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bin-${{ runner.os }}
          path: target/release/${{ steps.pkg.outputs.name }}-*

      - name: Build .deb (Linux only)
        if: runner.os == 'Linux'
        run: |
          cargo install cargo-deb --locked 2>/dev/null || true
          cp target/release/${{ steps.pkg.outputs.name }}-linux \
             target/release/${{ steps.pkg.outputs.name }}
          cargo deb --no-build

      - name: Upload .deb
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: deb-package
          path: target/debian/*.deb

  release:
    needs: [bump, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.bump.outputs.version }}
          name: Version ${{ needs.bump.outputs.version }}
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
