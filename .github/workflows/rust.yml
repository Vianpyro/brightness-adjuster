name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  workflows: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust components
      run: rustup component add rustfmt clippy

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: lint-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: GTK dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libgtk-3-dev \
          libappindicator3-dev \
          libxdo-dev \
          libssl-dev \
          libwayland-dev

    - name: Run fmt check
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo test --all-features --release --verbose

  build:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: build-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: GTK dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libgtk-3-dev \
          libappindicator3-dev \
          libxdo-dev \
          libssl-dev \
          libwayland-dev

    - name: Build (release)
      run: cargo build --release --verbose

    - name: Get package info
      id: pkg
      shell: bash
      run: |
        META=$(cargo metadata --no-deps --format-version 1)
        NAME=$(echo "$META" | grep '"name"' | head -1 | cut -d '"' -f4)
        VERSION=$(echo "$META" | grep '"version"' | head -1 | cut -d '"' -f4)
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Rename binary
      shell: bash
      run: |
        BIN=$(ls target/release | grep -v '\.' | head -n 1)
        if [ "${{ runner.os }}" = "Windows" ]; then
          mv target/release/$BIN target/release/${BIN}-windows.exe
        else
          mv target/release/$BIN target/release/${BIN}-linux
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ runner.os }}
        path: target/release/${{ steps.pkg.outputs.name }}-*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Get package info
      id: pkg
      run: |
        META=$(cargo metadata --no-deps --format-version 1)
        NAME=$(echo "$META" | grep '"name"' | head -1 | cut -d '"' -f4)
        VERSION=$(echo "$META" | grep '"version"' | head -1 | cut -d '"' -f4)
        echo "name=$NAME" >> $GITHUB_OUTPUT
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Check if tag exists
      id: tag
      run: |
        git fetch --tags
        if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
          echo "exists=true" >> $GITHUB_OUTPUT
        else
          echo "exists=false" >> $GITHUB_OUTPUT
        fi

    - name: Create tag
      if: steps.tag.outputs.exists == 'false'
      run: |
        git tag v${{ steps.pkg.outputs.version }}
        git push origin v${{ steps.pkg.outputs.version }}

    - name: Create Release
      if: steps.tag.outputs.exists == 'false'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.pkg.outputs.version }}
        name: ${{ steps.pkg.outputs.name }} v${{ steps.pkg.outputs.version }}
        files: artifacts/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
